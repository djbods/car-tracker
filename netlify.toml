[build]
  publish = "."
  # Generate config.local.js from Netlify environment variables.
  # Set SUPABASE_URL and SUPABASE_PUBLISHABLE_KEY in Netlify → Site settings → Environment variables.
  command = """
cat > config.local.js <<EOF
window.APP_CONFIG = {
  SUPABASE_URL: "$SUPABASE_URL",
  SUPABASE_PUBLISHABLE_KEY: "$SUPABASE_PUBLISHABLE_KEY",
};
EOF
"""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
